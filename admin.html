<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Add New Jobs</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f1f5f9; padding: 30px 15px; }
        .form-box { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { color: #0d6efd; margin-bottom: 20px; text-align: center; }
        label { font-weight: bold; font-size: 14px; color: #475569; display: block; margin-top: 15px; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 15px; }
        textarea { resize: vertical; height: 100px; }
        .btn-submit { background-color: #0d6efd; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background-color: #0b5ed7; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #64748b; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>🚀 Admin - Post a New Job</h2>
        <form onsubmit="addNewJob(event)">
            <label>Job Designation / Title</label>
            <input type="text" id="jobTitle" placeholder="e.g. Computer Operator, Security Guard" required>

            <label>Job Category</label>
            <select id="jobCat">
                <option value="govt">Government Job</option>
                <option value="private">Private Job</option>
                <option value="abroad">✈️ Abroad Work Visa</option>
            </select>

            <label>Location / Country</label>
            <input type="text" id="jobLoc" placeholder="e.g. Lahore, Saudi Arabia" required>

            <label>Last Date / Visa Info</label>
            <input type="text" id="jobExtra" placeholder="e.g. Last Date: 28 July 2026 / Free Food" required>

            <label>Full Description & Requirements</label>
            <textarea id="jobDesc" placeholder="Complete details aur qualifications yahan likhein..." required></textarea>

            <button type="submit" class="btn-submit">Publish to Website</button>
        </form>
        <a href="index.html" class="back-link">← Go to Home Page</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
