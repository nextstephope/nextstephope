<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextStepHope - Real Working Job & News Portal</title>
    <style>
        /* CSS Styling: Website ka Design */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding-bottom: 40px; }
        
        /* Header Navigation */
        header { background-color: #0d6efd; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 22px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 5px; }
        .nav-buttons button { background: none; border: 1px solid white; color: white; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .nav-buttons button:hover { background: white; color: #0d6efd; }
        
        /* Hero Section with Search Bar */
        .hero { background: #004085; color: white; text-align: center; padding: 40px 20px; }
        .hero h1 { margin-bottom: 15px; }
        .search-box { max-width: 500px; margin: 0 auto; display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 10px; border-radius: 4px; border: none; font-size: 16px; width: 100%; }
        
        /* Breaking News Ticker */
        .ticker { background-color: #ffc107; color: #000; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; }

        /* Main Content Container */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .section-title { margin-bottom: 15px; color: #0d6efd; border-left: 5px solid #0d6efd; padding-left: 10px; font-size: 22px; }
        
        /* Job Grid Layout */
        .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .job-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #0d6efd; transition: transform 0.2s; }
        .job-card:hover { transform: translateY(-3px); }
        
        /* Different Colors for Different Job Types */
        .job-card.govt { border-left-color: #dc3545; }
        .job-card.private { border-left-color: #198754; }
        .job-card.abroad { border-left-color: #6f42c1; }
        
        .job-type { font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
        .type-govt { color: #dc3545; }
        .type-private { color: #198754; }
        .type-abroad { color: #6f42c1; }
        
        .job-title { font-size: 18px; margin-bottom: 10px; color: #222; }
        .job-desc { font-size: 14px; color: #666; margin-bottom: 15px; }
        .btn-view { background-color: #0d6efd; color: white; border: none; padding: 10px 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        .btn-view:hover { background-color: #0b5ed7; }

        /* Educational News Section Styling */
        .news-list { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .news-item { padding: 12px 0; border-bottom: 1px solid #eee; }
        .news-item:last-child { border-bottom: none; }
        .news-date { font-size: 12px; color: #999; font-weight: bold; }
        .news-heading { font-size: 16px; color: #333; margin-top: 5px; font-weight: 500; }
        .btn-news { background: none; border: none; color: #0d6efd; font-size: 16px; font-weight: bold; cursor: pointer; padding: 0; text-align: left; }
        .btn-news:hover { text-decoration: underline; color: #0b5ed7; }

        /* Footer */
        footer { background-color: #212529; color: white; text-align: center; padding: 15px 0; margin-top: 40px; font-size: 14px; }

        /* 📱 MOBILE RESPONSIVE STYLING (Lesson 4) */
        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; padding: 15px 10px; }
            .nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-top: 10px; }
            .nav-buttons button { margin-left: 0; flex: 1 1 40%; font-size: 13px; padding: 6px 10px; }
            .hero h1 { font-size: 24px; }
            .hero p { font-size: 14px; }
            .search-box { width: 100%; padding: 0 10px; }
            .job-grid { grid-template-columns: 1fr; gap: 15px; }
            .container { padding: 0 15px; margin: 20px auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🚀 NextStepHope</div>
        <div class="nav-buttons">
            <button onclick="filterJobs('all')">All Jobs</button>
            <button onclick="filterJobs('govt')">Govt Jobs</button>
            <button onclick="filterJobs('private')">Private Jobs</button>
            <button onclick="filterJobs('abroad')">✈️ Abroad Jobs</button>
        </div>
    </header>

    <div class="ticker">
        📢 BREAKING NEWS: PPSC, FIA and Abroad Work Visas Announced Today! Apply Before Last Date.
    </div>

    <section class="hero">
        <h1>Apni Umeed Ki Naukri Aur Visa Talaash Karein</h1>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchJob()" placeholder="Job ya Mulk (Country) ka naam likhein...">
        </div>
    </section>

    <div class="container">
        
        <h2 class="section-title" id="sectionHeading">Showing All Jobs</h2>
        <div class="job-grid" id="jobList">
            </div>

        <h2 class="section-title">📰 Educational & Exam News</h2>
        <div class="news-list">
            <div class="news-item">
                <span class="news-date">July 1, 2026</span>
                <div class="news-heading">
                    <button class="btn-news" onclick="alert('NTS Board News:\n\nAll Matric and Intermediate students can download their official datesheets from the NTS portal now. Exams are starting next month!')">NTS Board Exam Datesheets Announced for Session 2026</button>
                </div>
            </div>
            <div class="news-item">
                <span class="news-date">June 29, 2026</span>
                <div class="news-heading">
                    <button class="btn-news" onclick="alert('HEC Scholarship Update:\n\nHEC has launched a 100% free scholarship for IT, Software Engineering, and Computer Science students. Laptop and monthly stipend will be provided.')">HEC New Scholarship Program for IT Students - Apply Online</button>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 NextStepHope. Created with ❤️ for a Better Future.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
